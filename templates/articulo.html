<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITULO}} | Noticias MJR-21</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="news-header">
  <div class="news-flagbar"></div>
  <div class="header-inner">
    <a href="/" class="brand">
      <img src="/img/logo.png" alt="" class="brand-logo">
      <span class="brand-text">MJR<span class="brand-dash">-21</span></span>
      <span class="brand-sub">Noticias</span>
    </a>
    <a href="/" class="back-link">← Volver al inicio</a>
  </div>
</header>

<main class="container narrow article-page">
  <span class="tag-pill">{{CATEGORIA}}</span>
  <h1>{{TITULO}}</h1>
  <p class="article-meta">{{AUTOR}} · {{FECHA}}</p>
  <img class="article-cover" src="{{IMAGEN}}" alt="{{TITULO}}">
  <div class="article-body">
    {{CUERPO}}
  </div>
</main>

<section class="container">
  {{RELACIONADOS}}
</section>

<footer class="news-footer">
  <p>© {{ANIO}} MJR-21 — Por dignidad, por justicia, por nuestra Colombia.</p>
</footer>

</body>
</html>
